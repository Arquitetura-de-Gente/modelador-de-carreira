<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelador de Arquitetura de Carreiras - Arquitetura de Gente</title>
    <style>
        :root {
            --bg-main: #0d0b14;
            --bg-card: #161224;
            --bg-input: #201a34;
            --accent: #ff4500;
            --text-main: #e2e0e7;
            --text-muted: #b0aec2;
            --border: #3d355c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* LOGO COM FUNDO TOTALMENTE TRANSPARENTE - SEM VERMELHO */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
            background: transparent !important;
            background-color: transparent !important;
        }

        .logo-container img {
            max-height: 85px;
            background: transparent !important;
            background-color: transparent !important;
            display: inline-block;
            border: none;
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 5px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .form-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-top: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ffffff;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            outline: 2px solid var(--accent);
        }

        .dynamic-fields {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-bottom: 10px;
        }

        .btn:hover {
            background-color: #e03d00;
        }

        .btn-secondary {
            background-color: #4a3e75;
            margin-top: 25px;
        }

        .btn-secondary:hover {
            background-color: #3b3160;
        }

        /* OUTPUTS VISUAIS */
        .output-section {
            margin-top: 40px;
            display: none;
            width: 100%;
        }

        .visual-card {
            background-color: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .visual-title {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .visual-sector {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Carreira em I */
        .career-i-flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .node {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 6px;
            width: 280px;
            font-weight: bold;
            position: relative;
        }

        .node::after {
            content: "↓";
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-size: 1.2rem;
        }

        .node:last-child::after {
            content: "";
        }

        /* Carreira em Y */
        .career-y-flow {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .y-fork {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .branch {
            border: 2px dashed var(--accent);
            padding: 20px;
            border-radius: 8px;
            width: 220px;
            background-color: rgba(255, 69, 0, 0.05);
        }

        .branch-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Carreira em W */
        .career-w-flow {
            position: relative;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            height: 330px;
        }

        .w-path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .w-path-svg polyline {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            stroke-linejoin: round;
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
        }

        .w-path-svg circle {
            fill: var(--bg-main);
            stroke: var(--accent);
            stroke-width: 2.5;
            vector-effect: non-scaling-stroke;
        }

        .w-node {
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 6px;
            width: 190px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }

        .w-node.hybrid {
            border-color: var(--accent);
            background-color: #291a2e;
        }

        .w-node-1 { left: 10%; top: 14%; }
        .w-node-2 { left: 50%; top: 34%; }
        .w-node-3 { left: 90%; top: 14%; }

        .node-tag {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
        }

        @media print {
            body {
                background-color: #ffffff !important;
                color: #000000 !important;
                padding: 0;
            }
            .form-section, .btn, .btn-secondary, .subtitle, h1 {
                display: none !important;
            }
            .logo-container {
                display: block !important;
                margin-bottom: 30px;
                background: transparent !important;
                background-color: transparent !important;
            }
            .logo-container img {
                background: transparent !important;
                background-color: transparent !important;
            }
            .output-section {
                display: block !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .visual-card {
                border: none !important;
                background-color: #ffffff !important;
                color: #000000 !important;
                padding: 0 !important;
            }
            .visual-title {
                color: #000000 !important;
                font-size: 22pt !important;
            }
            .visual-sector {
                color: #555555 !important;
            }
            .node, .w-node {
                background-color: #f5f5f7 !important;
                border: 1px solid #cccccc !important;
                color: #000000 !important;
                box-shadow: none !important;
            }
            .branch {
                background-color: #fafafa !important;
                border: 2px dashed #666666 !important;
                color: #000000 !important;
            }
            .node-tag, .branch-title, .node::after {
                color: #ff4500 !important;
            }
        }
    </style>
</head>

    <div class="subtitle">Gente & Gestão — Inteligência Estratégica</div>
    <h1>Modelador de Arquitetura de Carreiras</h1>

    <div class="form-section">
        <div class="form-group">
            <label for="sector">Setor / Área da Empresa</label>
            <input type="text" id="sector" placeholder="Ex: Metalmecânico, Indústria Moveleira, Vitivinicultura, Tecnologia...">
        </div>

        <div class="form-group">
            <label for="modelSelect">Escolha o Modelo de Carreira</label>
            <select id="modelSelect" onchange="updateFormFields()">
                <option value="">-- Selecione um Modelo --</option>
                <option value="I">Carreira em I (Especialista Técnico)</option>
                <option value="Y">Carreira em Y (Bifurcação: Gestão ou Técnico)</option>
                <option value="W">Carreira em W (Híbrido / Gestor de Projetos)</option>
            </select>
        </div>

        <div id="dynamicFields" class="dynamic-fields"></div>
        
        <div id="buttonContainer" style="display: none; margin-top: 20px;">
            <button class="btn" onclick="generateVisualization()">Gerar Estrutura Visual</button>
        </div>
    </div>

    <div id="outputSection" class="output-section">
        <div class="visual-card">
            <div id="visualCard"></div>
            
            <button class="btn btn-secondary" onclick="window.print()">
                🖨️ Salvar Apenas a Estrutura em PDF (Levar para o Gestor)
            </button>
        </div>
    </div>
</div>

<script>
    function updateFormFields() {
        const model = document.getElementById('modelSelect').value;
        const container = document.getElementById('dynamicFields');
        const btnContainer = document.getElementById('buttonContainer');
        
        container.innerHTML = '';
        document.getElementById('outputSection').style.display = 'none';

        if (!model) {
            btnContainer.style.display = 'none';
            return;
        }

        btnContainer.style.display = 'block';

        if (model === 'I') {
            container.innerHTML = `
                <h3>Caminho de Especialização Técnico (Vertical)</h3>
                <div class="form-group"><label>Nível 1 (Entrada / Júnior):</label><input type="text" id="i_level1" placeholder="Ex: Auxiliar Técnico / Assistente"></div>
                <div class="form-group"><label>Nível 2 (Pleno):</label><input type="text" id="i_level2" placeholder="Ex: Analista / Operador Especializado"></div>
                <div class="form-group"><label>Nível 3 (Sênior):</label><input type="text" id="i_level3" placeholder="Ex: Desenvolvedor Sênior / Engenheiro Sênior"></div>
                <div class="form-group"><label>Nível Master (Especialista):</label><input type="text" id="i_level4" placeholder="Ex: Especialista de Processos / Consultor"></div>
            `;
        } else if (model === 'Y') {
            container.innerHTML = `
                <h3>Tronco Base e Bifurcação</h3>
                <div class="form-group"><label>Base Técnica I (Júnior):</label><input type="text" id="y_base1" placeholder="Ex: Técnico Júnior"></div>
                <div class="form-group"><label>Base Técnica II (Pleno):</label><input type="text" id="y_base2" placeholder="Ex: Técnico Pleno"></div>
                <h4>A Encruzilhada Estratégica:</h4>
                <div class="form-group"><label>Ponta de GESTÃO (Liderança de Pessoas):</label><input type="text" id="y_mgt" placeholder="Ex: Coordenador / Supervisor / Gerente"></div>
                <div class="form-group"><label>Ponta de ESPECIALISTA (Referência Técnico):</label><input type="text" id="y_spec" placeholder="Ex: Especialista Técnico / Arquiteto"></div>
            `;
        } else if (model === 'W') {
            container.innerHTML = `
                <h3>Fluxo de Competências Intermitentes (Híbrido)</h3>
                <div class="form-group"><label>Fase 1 (Execução Técnico Pura):</label><input type="text" id="w_phase1" placeholder="Ex: Engenheiro de Produto"></div>
                <div class="form-group"><label>Fase 2 (Híbrido: Gestão de Projetos + Prática):</label><input type="text" id="w_phase2" placeholder="Ex: Líder de Projeto / Scrum Master"></div>
                <div class="form-group"><label>Fase 3 (Liderança Consultiva / Portfólio):</label><input type="text" id="w_phase3" placeholder="Ex: Especialista em Melhoria Contínua / Black Belt"></div>
            `;
        }
    }

    function generateVisualization() {
        const sector = document.getElementById('sector').value || 'Geral';
        const model = document.getElementById('modelSelect').value;
        const card = document.getElementById('visualCard');
        const outputSection = document.getElementById('outputSection');

        let htmlContent = '';

        if (model === 'I') {
            const l1 = document.getElementById('i_level1').value || 'Nível 1';
            const l2 = document.getElementById('i_level2').value || 'Nível 2';
            const l3 = document.getElementById('i_level3').value || 'Nível 3';
            const l4 = document.getElementById('i_level4').value || 'Nível Master';

            htmlContent = `
                <div class="visual-title">Estrutura de Carreira em I</div>
                <div class="visual-sector">Área/Setor: ${sector}</div>
                <div class="career-i-flow">
                    <div class="node"><div class="node-tag">Especialista Master</div>${l4}</div>
                    <div class="node"><div class="node-tag">Sênior</div>${l3}</div>
                    <div class="node"><div class="node-tag">Pleno</div>${l2}</div>
                    <div class="node"><div class="node-tag">Entrada / Júnior</div>${l1}</div>
                </div>
            `;
        } else if (model === 'Y') {
            const b1 = document.getElementById('y_base1').value || 'Base I';
            const b2 = document.getElementById('y_base2').value || 'Base II';
            const mgt = document.getElementById('y_mgt').value || 'Cargo de Gestão';
            const spec = document.getElementById('y_spec').value || 'Cargo de Especialista';

            htmlContent = `
                <div class="visual-title">Estrutura de Carreira em Y</div>
                <div class="visual-sector">Área/Setor: ${sector}</div>
                <div class="career-y-flow">
                    <div class="y-fork">
                        <div class="branch">
                            <div class="branch-title">💼 Liderança & Gestão</div>
                            <div><strong>${mgt}</strong></div>
                        </div>
                        <div class="branch">
                            <div class="branch-title">🔬 Técnica & Especialidade</div>
                            <div><strong>${spec}</strong></div>
                        </div>
                    </div>
                    <div class="career-i-flow">
                        <div class="node"><div class="node-tag">Tronco Base II</div>${b2}</div>
                        <div class="node"><div class="node-tag">Tronco Base I</div>${b1}</div>
                    </div>
                </div>
            `;
        } else if (model === 'W') {
            const p1 = document.getElementById('w_phase1').value || 'Fase Técnica';
            const p2 = document.getElementById('w_phase2').value || 'Fase Projetos';
            const p3 = document.getElementById('w_phase3').value || 'Fase Liderança';

            htmlContent = `
                <div class="visual-title">Estrutura de Carreira em W</div>
                <div class="visual-sector">Área/Setor: ${sector}</div>
                <div class="career-w-flow">
                    <svg class="w-path-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <polyline points="10,14 30,86 50,34 70,86 90,14"></polyline>
                        <circle cx="30" cy="86" r="1.6"></circle>
                        <circle cx="70" cy="86" r="1.6"></circle>
                    </svg>
                    <div class="w-node w-node-1">
                        <div class="node-tag">Fase 1: Execução</div>
                        <div>${p1}</div>
                    </div>
                    <div class="w-node hybrid w-node-2">
                        <div class="node-tag">Fase 2: Gestão Multidisciplinar</div>
                        <strong>${p2}</strong>
                    </div>
                    <div class="w-node w-node-3">
                        <div class="node-tag">Fase 3: Direção Consultiva</div>
                        <div>${p3}</div>
                    </div>
                </div>
            `;
        }

        card.innerHTML = htmlContent;
        outputSection.style.display = 'block';
        outputSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>
